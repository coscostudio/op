<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; display: flex; gap: 20px; padding: 50px; }
  .img-box { width: 300px; height: 300px; }
  img { width: 100%; height: 100%; object-fit: cover; }
  
  /* The progression */
</style>
</head>
<body>
  <div class="img-box">
    <h3>Original</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" />
  </div>
  <div class="img-box">
    <h3>25%</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" style="filter: grayscale(25%) invert(25%) sepia(25%) hue-rotate(50deg) saturate(150%) contrast(125%) brightness(105%)" />
  </div>
  <div class="img-box">
    <h3>50% (Deadzone)</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" style="filter: grayscale(50%) invert(50%) sepia(50%) hue-rotate(100deg) saturate(200%) contrast(150%) brightness(110%)" />
  </div>
  <div class="img-box">
    <h3>75%</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" style="filter: grayscale(75%) invert(75%) sepia(75%) hue-rotate(150deg) saturate(250%) contrast(175%) brightness(115%)" />
  </div>
  <div class="img-box">
    <h3>100% X-Ray</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" style="filter: grayscale(100%) invert(100%) sepia(100%) hue-rotate(200deg) saturate(300%) contrast(200%) brightness(120%)" />
  </div>
</body>
</html>
