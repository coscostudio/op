<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; display: flex; gap: 20px; padding: 50px; }
  .img-box { width: 300px; height: 300px; position: relative; }
  img { width: 100%; height: 100%; object-fit: cover; }
  .overlay { 
    position: absolute; top:0; left:0; right:0; bottom:0; 
    backdrop-filter: grayscale(100%) invert(100%) sepia(100%) hue-rotate(180deg) saturate(300%) contrast(200%) brightness(120%);
    -webkit-backdrop-filter: grayscale(100%) invert(100%) sepia(100%) hue-rotate(180deg) saturate(300%) contrast(200%) brightness(120%);
  }
</style>
</head>
<body>
  <div class="img-box">
    <h3>Original</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" />
  </div>
  <div class="img-box">
    <h3>50% Opacity</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" />
    <div class="overlay" style="opacity: 0.5"></div>
  </div>
  <div class="img-box">
    <h3>100% Opacity</h3>
    <img src="https://images.unsplash.com/photo-1506744626753-15794711f185" />
    <div class="overlay" style="opacity: 1"></div>
  </div>
</body>
</html>
